    <!-- Structured data (Schema.org JSON-LD).

         organisation panel) and understand that this site is the canonical
         publisher of an Election dataset. Each block is independently
         valid; multiple JSON-LD blocks are allowed per page. -->

    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GB Elections Dashboard",
      "alternateName": ["GB Elections 2026", "Gilgit Baltistan Elections Dashboard"],

      "description": "Public-records dashboard for the Gilgit-Baltistan Assembly election on 7 June 2026 and the 2009, 2015, 2020 historical record.",
      "publisher": { "@id": "https://www.gbelections.com/#organisation" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.gbelections.com/records/candidates?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

        "Gilgit-Baltistan",
        "GB elections",
        "GBA-1",
        "GBA-2",
        "ECGB",
        "Assembly",
        "Pakistan",

      ],

      "creator": { "@id": "https://www.gbelections.com/#organisation" },
      "license": "https://creativecommons.org/licenses/by/4.0/",
      "isAccessibleForFree": true,
      "temporalCoverage": "2009/2026",
      "spatialCoverage": {
        "@type": "Place",
        "name": "Gilgit-Baltistan, Pakistan",
        "geo": {
